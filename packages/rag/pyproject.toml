[project]
name = "visora-rag"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "visora-schemas",
  "visora-db",
  "llama-index>=0.11",
  "langchain>=0.3",
  "langchain-community>=0.3",
  "pageindex>=0.1",
  "supabase>=2.0"
]

[tool.uv.sources]
visora-schemas = { workspace = true }
visora-db = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
