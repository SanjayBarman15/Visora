[project]
name = "mova-tools"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "mova-schemas",
  "mova-rag",
  "httpx>=0.27",
  "playwright>=1.44",
  "youtube-transcript-api>=0.6"
]

[tool.uv.sources]
mova-schemas = { workspace = true }
mova-rag = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
