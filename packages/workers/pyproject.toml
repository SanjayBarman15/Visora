[project]
name = "mova-workers"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "mova-schemas",
  "mova-agents",
  "mova-rag",
  "mova-db",
  "celery>=5.3",
  "redis>=5.0",
  "manim>=0.18"
]

[tool.uv.sources]
mova-schemas = { workspace = true }
mova-agents = { workspace = true }
mova-rag = { workspace = true }
mova-db = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
