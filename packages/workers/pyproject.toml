[project]
name = "visora-workers"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "visora-schemas",
  "visora-agents",
  "visora-rag",
  "visora-db",
  "celery>=5.3",
  "redis>=5.0",
  "manim>=0.18"
]

[tool.uv.sources]
visora-schemas = { workspace = true }
visora-agents = { workspace = true }
visora-rag = { workspace = true }
visora-db = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/visora_workers"]
