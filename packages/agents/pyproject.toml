[project]
name = "mova-agents"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "mova-schemas",
  "mova-rag",
  "mova-tools",
  "langgraph>=0.2",
  "langchain>=0.3",
  "langchain-core>=0.3",
  "pydantic-ai>=0.0.14",
  "langsmith>=0.1"
]

[tool.uv.sources]
mova-schemas = { workspace = true }
mova-rag = { workspace = true }
mova-tools = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
