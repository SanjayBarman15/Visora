[project]
name = "visora-agents"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "visora-schemas",
  "visora-rag",
  "visora-tools",
  "langgraph>=0.2",
  "langchain>=0.3",
  "langchain-core>=0.3",
  "pydantic-ai>=0.0.14",
  "langsmith>=0.1",
  "pydantic-settings>=2.0.0"
]

[tool.uv.sources]
visora-schemas = { workspace = true }
visora-rag = { workspace = true }
visora-tools = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
