cat > pyproject.toml << 'EOF'
[tool.uv.workspace]
members = [
  "apps/api",
  "packages/schemas",
  "packages/agents",
  "packages/rag",
  "packages/workers",
  "packages/db",
  "packages/mcp",
  "packages/tools"
]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.mypy]
python_version = "3.11"
strict = true
EOF